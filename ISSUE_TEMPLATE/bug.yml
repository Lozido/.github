name: Bug Report
description: Báo cáo lỗi
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Mô tả lỗi
      description: Lỗi xảy ra như thế nào?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Vào trang...
        2. Nhấn...
        3. Thấy lỗi...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs Actual
      placeholder: |
        **Expected:** ...
        **Actual:** ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS: ...
        - Browser/App version: ...
        - Branch/Commit: ...
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - "🔴 Critical"
        - "🟠 Major"
        - "🟡 Minor"
        - "🟢 Trivial"
    validations:
      required: true
